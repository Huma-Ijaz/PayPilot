<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
    <title>PayPilot — Profile</title>
    <link rel="stylesheet" href="css/profile-stylesheet.css">
</head>
<body>

            <header>
            <nav>
                <h2 class="h2-nav">Pay<em>Pilot</em></h2>

                <ul>
                    <li><a href="#">Features</a></li>
                    <li><a href="#">Pricing</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Login</a></li>
                    <li><a href="#" class="sign-up">Sign-up</a></li>
                </ul>
            </nav>
        </header>

    <div id="container">
        <h1>My Profile</h1>
        <div id="div1">
            <div class="initials">AH</div>
            <div class="user-info">
            <div class="username">Ali Hassan</div>
            <div class="profile-email"><a href="mailto:ali.hassan@example.com">[email&#160;protected]</a></div>
            <div class="verification">Verified</div>
        </div>
        </div>
        <div id="view-mode">
            <table>
                <tr>
                    <td>
                        <h3 class="info">Account Details</h3>
                    </td>
                </tr>

                <tr>
                    <td>
                        <div class="icon">📱</div>
                        <div class ="info-box">
                        <div class="info-label">Phone</div>
                        <div class="info">123-456-7890</div>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td>
                        <div class="icon">🪪</div>
                        <div class ="info-box"> 
                        <div class="info-label">CNIC</div>
                        <div class="info">12345-6789012-3</div>
                        </div>

                    </td>
                </tr>

                <tr>
                    <td>
                        <div class="icon">📅</div>
                        <div class="info-box">
                        <div class="info-label">Member Since</div>
                        <div class="info">January 2022</div>
                        </div>

                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="icon">⭐</div>
                        <div class="info-box">
                        <div class="info-label">Account Level</div>
                        <div class="info">Premium</div>
                        </div>
                    </td>
                </tr>
            </table>
        </div>

            <button class="btn" onclick="showEdit()">Edit Profile</button>
            <div id="edit-mode" style="display:none; width:50%;">
                <input type="text" id="edit-name" placeholder="Full Name"><br><br>
                <input type="text" id="edit-phone" placeholder="Phone Number"><br><br>
                <button class="btn" onclick="saveProfile()">Save Changes</button>
                <button class="btn" style="background-color:gray;" onclick="cancelEdit()">Cancel</button>
</div>
    </div>

    <script>
    function showEdit() {
        document.getElementById('view-mode').style.display = 'none';
        document.getElementById('edit-mode').style.display = 'block';
    }

    function cancelEdit() {
        document.getElementById('edit-mode').style.display = 'none';
        document.getElementById('view-mode').style.display = 'block';
    }

    function saveProfile() {
    var name = document.getElementById('edit-name').value;
    var phone = document.getElementById('edit-phone').value;

    if (name === '' || phone === '') {
        alert('Please fill in all fields');
        return;
    }

    var formData = new FormData();
    formData.append('name', name);
    formData.append('phone', phone);

    fetch('php/profile.php', {
        method: 'POST',
        body: formData
    })
   .then(function(response) {
    if (response.ok) {
        alert('Profile updated successfully!');
        location.reload();
    }
});
    }
</script>

</body>
</html>
